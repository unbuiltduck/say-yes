<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>a question, carefully asked</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>

    /* ═════════════════════════════════
       TOKENS
    ═════════════════════════════════ */
    :root {
      --canvas:      #f4ece5;          /* warm cream */
      --canvas-2:    #ecdfd6;          /* deeper cream */
      --paper:       #faf4ee;          /* card surface */
      --rose:        #c9526e;          /* dusty rose */
      --rose-soft:   #e8a8b8;
      --rose-deep:   #9e3a52;
      --champagne:   #e8d5c0;
      --mauve:       #8a6a7e;
      --mauve-soft:  #b89cab;
      --ink:         #2a1f26;
      --ink-mid:     #5d4a55;
      --ink-soft:    #8a7886;
      --line:        rgba(138, 106, 126, .22);

      --ease:        cubic-bezier(.32,.72,.24,1);
      --bounce:      cubic-bezier(.34,1.36,.64,1);
    }

    /* ═════════════════════════════════
       RESET
    ═════════════════════════════════ */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body { height: 100%; }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 32px 24px;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, #fbeee2 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 50% 100%, #ead7c8 0%, transparent 55%),
        linear-gradient(160deg, var(--canvas) 0%, var(--canvas-2) 100%);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* subtle paper grain via SVG noise */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .35;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.42  0 0 0 0 0.49  0 0 0 .12 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    }

    /* ═════════════════════════════════
       CANVAS / PAPER
    ═════════════════════════════════ */
    .paper {
      position: relative;
      width: min(640px, 100%);
      background: var(--paper);
      border-radius: 28px;
      padding: clamp(36px, 6vw, 64px) clamp(28px, 5vw, 64px) clamp(32px, 5vw, 52px);
      box-shadow:
        0 1px 0 rgba(255,255,255,.7) inset,
        0 30px 80px -30px rgba(80, 40, 60, .25),
        0 8px 24px -12px rgba(80, 40, 60, .12);
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: paper-in 1.1s var(--bounce) both;
    }

    @keyframes paper-in {
      0%   { opacity:0; transform: translateY(18px); }
      100% { opacity:1; transform: translateY(0); }
    }

    /* tiny corner ornament */
    .ornament {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      letter-spacing: 14px;
      font-size: 9px;
      color: var(--mauve-soft);
      font-weight: 500;
      text-transform: uppercase;
    }

    /* ═════════════════════════════════
       MASTHEAD
    ═════════════════════════════════ */
    .eyebrow {
      margin-top: 18px;
      font-family: 'Inter', sans-serif;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--mauve);
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      text-align: center;
    }

    .headline {
      margin-top: 14px;
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-style: italic;
      font-size: clamp(34px, 5.4vw, 48px);
      line-height: 1.05;
      letter-spacing: -0.8px;
      color: var(--ink);
      text-align: center;
    }

    .headline .ampersand {
      color: var(--rose);
      font-weight: 300;
    }

    .subline {
      margin-top: 14px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--ink-soft);
      text-align: center;
      letter-spacing: .15px;
    }

    /* divider */
    .divider {
      width: 36px;
      height: 1px;
      background: var(--line);
      margin: 28px 0 8px;
    }

    /* ═════════════════════════════════
       STAGE
    ═════════════════════════════════ */
    .stage {
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: clamp(36px, 7vw, 72px);
      padding: 24px 0 16px;
      width: 100%;
    }

    .col {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 140px;
    }

    .label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: var(--mauve);
      margin-bottom: 14px;
    }

    /* ── BUBBLE ── */
    .bubble-slot {
      position: relative;
      height: 64px;
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      margin-bottom: 12px;
    }

    .bubble {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 200px;
      background: #fff;
      color: var(--ink);
      padding: 10px 16px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.35;
      letter-spacing: .1px;
      text-align: center;
      white-space: nowrap;
      border: 1px solid var(--line);
      box-shadow: 0 8px 22px -8px rgba(80, 40, 60, .18);
      transition:
        opacity .4s var(--ease),
        transform .5s var(--bounce);
      z-index: 3;
    }
    .bubble::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 11px;
      height: 11px;
      background: #fff;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .bubble.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(8px) scale(.94);
      pointer-events: none;
    }
    .bubble.pop {
      animation: pop .55s var(--bounce);
    }
    @keyframes pop {
      0%   { transform: translateX(-50%) scale(.85); }
      55%  { transform: translateX(-50%) scale(1.04); }
      100% { transform: translateX(-50%) scale(1); }
    }

    /* ═════════════════════════════════
       PANDA
    ═════════════════════════════════ */
    .panda-wrap {
      position: relative;
      width: 140px;
      height: 150px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .panda {
      font-size: 120px;
      line-height: 1;
      filter: drop-shadow(0 8px 12px rgba(80,40,60,.18));
      animation: idle 5s ease-in-out infinite;
      transform-origin: 50% 95%;
      user-select: none;
      -webkit-user-select: none;
    }
    .col:first-child .panda { animation-delay: -1.7s; }

    @keyframes idle {
      0%, 100% { transform: translateY(0) rotate(0); }
      50%      { transform: translateY(-4px) rotate(-1deg); }
    }

    /* the smacking hand — emoji used as her arm */
    .hand {
      position: absolute;
      bottom: 32px;
      right: -18px;
      font-size: 38px;
      line-height: 1;
      transform-origin: 80% 80%;
      transform: rotate(-12deg);
      opacity: 0;
      pointer-events: none;
      z-index: 4;
      filter: drop-shadow(0 4px 6px rgba(80,40,60,.22));
    }

    .female.smacking .hand {
      animation: smack .6s var(--ease);
    }

    @keyframes smack {
      0%   { opacity: 0; transform: rotate(-12deg) translate(0, 0) scale(.9); }
      18%  { opacity: 1; transform: rotate(28deg)  translate(28px, -8px) scale(1.05); }
      45%  { opacity: 1; transform: rotate(60deg)  translate(56px, -2px) scale(1.1); }
      75%  { opacity: 1; transform: rotate(35deg)  translate(40px, 4px)  scale(1); }
      100% { opacity: 0; transform: rotate(-12deg) translate(0, 0) scale(.9); }
    }

    .female.smacking .panda {
      animation: lunge .6s var(--ease);
    }
    @keyframes lunge {
      0%, 100% { transform: translateY(0) rotate(0); }
      30%      { transform: translate(20px, -6px) rotate(8deg); }
      60%      { transform: translate(14px, 0)    rotate(4deg); }
    }

    .male.shaking .panda {
      animation: shake .55s ease-in-out;
    }
    @keyframes shake {
      0%  { transform: translateX(0) rotate(0); }
      18% { transform: translateX(20px) rotate(9deg); }
      38% { transform: translateX(-12px) rotate(-5deg); }
      58% { transform: translateX(11px) rotate(4deg); }
      78% { transform: translateX(-5px) rotate(-2deg); }
      100%{ transform: translateX(0) rotate(0); }
    }

    /* impact burst — appears between them */
    .impact {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%) scale(.4);
      font-size: 36px;
      opacity: 0;
      pointer-events: none;
      z-index: 5;
      filter: drop-shadow(0 2px 4px rgba(201,82,110,.4));
    }
    .impact.go {
      animation: impact-pop .55s var(--bounce);
    }
    @keyframes impact-pop {
      0%   { opacity: 0; transform: translateX(-50%) scale(.4) rotate(-15deg); }
      40%  { opacity: 1; transform: translateX(-50%) scale(1.2) rotate(8deg); }
      100% { opacity: 0; transform: translateX(-50%) scale(1.6) rotate(20deg); }
    }

    /* soft floor shadow */
    .floor {
      position: absolute;
      bottom: 4px;
      left: 50%;
      width: 96px;
      height: 12px;
      background: radial-gradient(ellipse, rgba(80,40,60,.18), transparent 70%);
      border-radius: 50%;
      transform: translateX(-50%);
      filter: blur(2px);
      animation: floor-pulse 5s ease-in-out infinite;
    }
    .col:first-child .floor { animation-delay: -1.7s; }
    @keyframes floor-pulse {
      0%, 100% { transform: translateX(-50%) scale(1);   opacity: 1; }
      50%      { transform: translateX(-50%) scale(.92); opacity: .75; }
    }

    /* ═════════════════════════════════
       ACTIONS
    ═════════════════════════════════ */
    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 28px;
    }
    .actions.hidden { display: none; }

    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .3px;
      padding: 14px 36px;
      border-radius: 999px;
      cursor: pointer;
      transition:
        transform .2s var(--ease),
        box-shadow .25s var(--ease),
        background .2s var(--ease),
        color .2s var(--ease);
      border: 1.5px solid transparent;
    }
    .btn:focus-visible {
      outline: 2px solid var(--rose);
      outline-offset: 3px;
    }

    .btn-yes {
      background: var(--rose);
      color: #fff;
      border-color: var(--rose);
      box-shadow:
        0 1px 0 rgba(255,255,255,.25) inset,
        0 8px 22px -10px rgba(201, 82, 110, .55);
    }
    .btn-yes:hover {
      background: var(--rose-deep);
      border-color: var(--rose-deep);
      transform: translateY(-2px);
      box-shadow:
        0 1px 0 rgba(255,255,255,.3) inset,
        0 12px 28px -8px rgba(158, 58, 82, .55);
    }
    .btn-yes:active { transform: translateY(0); }

    .btn-no {
      background: transparent;
      color: var(--mauve);
      border-color: var(--mauve-soft);
    }
    .btn-no:hover {
      color: var(--ink);
      border-color: var(--mauve);
      background: rgba(138, 106, 126, .07);
      transform: translateY(-2px);
    }
    .btn-no:active { transform: translateY(0); }

    /* ═════════════════════════════════
       RESULT
    ═════════════════════════════════ */
    .result {
      margin-top: 28px;
      min-height: 28px;
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(18px, 2.6vw, 22px);
      color: var(--rose);
      letter-spacing: -.2px;
      text-align: center;
      opacity: 0;
      transform: translateY(8px);
      transition:
        opacity .7s .35s var(--ease),
        transform .7s .35s var(--bounce);
    }
    .result.muted { color: var(--mauve); }
    .result.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* footer mark */
    .mark {
      margin-top: 20px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: var(--mauve-soft);
    }
    .mark.hidden { display: none; }

    /* ═════════════════════════════════
       FLOATING PETALS
    ═════════════════════════════════ */
    .petal {
      position: fixed;
      pointer-events: none;
      will-change: transform, opacity;
      animation: petal-drift 4.5s linear forwards;
      z-index: 9999;
      filter: drop-shadow(0 4px 6px rgba(201,82,110,.18));
    }
    @keyframes petal-drift {
      0%   { opacity: 0; transform: translateY(0) translateX(0) rotate(0deg); }
      10%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-90vh) translateX(var(--drift,40px)) rotate(360deg); }
    }

    /* ═════════════════════════════════
       RESPONSIVE
    ═════════════════════════════════ */
    @media (max-width: 520px) {
      .paper { border-radius: 22px; }
      .stage { gap: 24px; }
      .col   { width: 110px; }
      .panda-wrap { width: 110px; height: 124px; }
      .panda { font-size: 96px; }
      .hand  { font-size: 30px; right: -10px; bottom: 26px; }
      .impact { font-size: 30px; bottom: 56px; }
      .bubble { font-size: 12px; padding: 8px 12px; max-width: 170px; }
      .btn { padding: 12px 28px; font-size: 13.5px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>

  <main class="paper">

    <span class="ornament">· · ·</span>

    <p class="eyebrow">since my probation is never gonna end,<br>I'd still like to ask</p>
    <h1 class="headline">
      will you be <span class="ampersand">my</span> girl?
    <!-- STAGE -->
    <div class="stage">

      <!-- ── HER ── -->
      <div class="col">
        <span class="label">you</span>

        <div class="bubble-slot">
          <div class="bubble hidden" id="femaleBubble"></div>
        </div>

        <div class="panda-wrap female" id="female">
          <span class="panda">🐼</span>
          <span class="hand">✋</span>
          <span class="floor"></span>
        </div>
      </div>

      <!-- ── HIM ── -->
      <div class="col">
        <span class="label">me</span>

        <div class="bubble-slot">
          <div class="bubble pop" id="maleBubble">will you be my girl?</div>
        </div>

        <div class="panda-wrap male" id="male">
          <span class="panda">🐼</span>
          <span class="impact" id="impact">💫</span>
          <span class="floor"></span>
        </div>
      </div>

    </div>

    <!-- ACTIONS -->
    <div class="actions" id="actions">
      <button class="btn btn-yes" onclick="answer(true)">Yes</button>
      <button class="btn btn-no"  onclick="answer(false)">No</button>
    </div>

    <!-- RESULT -->
    <p class="result" id="result"></p>

    <span class="mark hidden" id="mark">haha mine forever</span>

  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    function answer(yes) {
      const female       = $('female');
      const male         = $('male');
      const maleBubble   = $('maleBubble');
      const femaleBubble = $('femaleBubble');
      const actions      = $('actions');
      const result       = $('result');
      const impact       = $('impact');

      actions.classList.add('hidden');

      female.classList.add('smacking');
      male.classList.add('shaking');

      setTimeout(() => {
        impact.classList.add('go');
        setTimeout(() => impact.classList.remove('go'), 600);
      }, 280);

      femaleBubble.classList.remove('hidden');
      femaleBubble.classList.remove('pop');
      void femaleBubble.offsetWidth;
      femaleBubble.classList.add('pop');
      femaleBubble.textContent = yes ? "yeah but men still ain't shit" : "men ain't shit";

      maleBubble.classList.remove('pop');
      void maleBubble.offsetWidth;
      maleBubble.classList.add('pop');
      maleBubble.textContent = yes ? "best day ever" : "…worth it";

      setTimeout(() => {
        female.classList.remove('smacking');
        male.classList.remove('shaking');
      }, 650);

      if (yes) {
        result.textContent = "woooooooooo";
        result.classList.remove('muted');
        result.classList.add('show');
        $('mark').classList.remove('hidden');
        for (let i = 0; i < 14; i++) setTimeout(spawnPetal, i * 220);
      } else {
        result.textContent = "";
        result.classList.add('muted');
        result.classList.add('show');
      }
    }

    function spawnPetal() {
      const p = document.createElement('div');
      p.className = 'petal';
      const choices = ['🌸', '🌺', '🌷', '💮'];
      p.textContent = choices[Math.floor(Math.random() * choices.length)];
      const size = 18 + Math.random() * 14;
      p.style.fontSize = size + 'px';
      p.style.left = (Math.random() * 96 + 2) + 'vw';
      p.style.top  = '92vh';
      p.style.setProperty('--drift', (Math.random() * 120 - 60) + 'px');
      p.style.animationDuration = (3.5 + Math.random() * 2.5) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 6500);
    }
  </script>

</body>
</html>
